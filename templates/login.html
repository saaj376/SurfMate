<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --border: #dbe4f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eaf2ff, #f8fbff 55%, #eef2f7);
      color: var(--text);
    }
    .card {
      width: min(420px, calc(100vw - 32px));
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 20px; color: var(--muted); }
    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
      font-weight: 700;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12); }
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      background: var(--accent);
      color: white;
    }
    button:hover { background: var(--accent-dark); }
    .error {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="http://127.0.0.1:5000/login">
    <h1>IT Admin Panel</h1>
    <p>Sign in to continue to the dashboard.</p>
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <div style="margin-top: 20px;">
      <button type="submit">Log In</button>
    </div>
    <div id="error-box" class="error" hidden></div>
  </form>
  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");
    if (error) {
      const box = document.getElementById("error-box");
      box.textContent = error;
      box.hidden = false;
    }
  </script>
</body>
</html>
